<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD Software Labs | Create Admin Account</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .register-body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .register-card {
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            text-align: center;
            animation: slide-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .register-card h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .register-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="register-body">
    <!-- Ambient BG -->
    <div class="ambient-bg">
        <div class="glow-blob glow-1"></div>
        <div class="glow-blob glow-2"></div>
        <div class="glow-blob glow-3"></div>
    </div>

    <!-- Registration Screen -->
    <div class="glass-container register-card" id="register-screen">
        <a href="index.html" class="logo-link" style="justify-content: center; margin-bottom: 1.5rem;">
            <img src="assets/KD labs logo.jpeg" alt="KD Software Labs Logo" class="brand-logo" style="height: 80px; filter: invert(1) hue-rotate(180deg); mix-blend-mode: screen;">
        </a>
        <h2>New Admin Account</h2>
        <p>Register a new admin credentials for the control console</p>
        
        <form id="admin-register-form">
            <div class="form-group" style="text-align: left;">
                <label for="reg-email">Admin Email</label>
                <input type="email" class="form-control" id="reg-email" placeholder="admin@kdsoftwarelabs.com" required autofocus>
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="reg-password">Password (min 6 characters)</label>
                <input type="password" class="form-control" id="reg-password" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group" style="text-align: left;">
                <label for="reg-confirm-password">Confirm Password</label>
                <input type="password" class="form-control" id="reg-confirm-password" placeholder="••••••••" required>
            </div>



            <div id="register-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; text-align: left;"></div>
            <div id="register-success" style="color: var(--secondary); font-size: 0.85rem; margin-top: 0.5rem; display: none; text-align: left;">Account registered successfully! Redirecting to login...</div>

            <button type="submit" class="cta-btn" style="width: 100%; margin-top: 1.5rem;">Register Account</button>
        </form>
        <p style="margin-top: 2rem; font-size: 0.85rem;"><a href="admin.html" style="color: var(--secondary); text-decoration: none;">Back to Admin Sign In</a></p>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    <!-- Script Logic -->
    <script src="register.js"></script>
</body>
</html>
